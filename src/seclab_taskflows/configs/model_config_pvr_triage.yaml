# PVR triage model configuration.
# AI_API_ENDPOINT defaults to https://api.githubcopilot.com (set in run_pvr_triage.sh).
# Override AI_API_ENDPOINT and AI_API_TOKEN for other providers.

seclab-taskflow-agent:
  version: "1.0"
  filetype: model_config

models:
  # Primary model for code analysis and triage reasoning
  triage: claude-opus-4.6-1m
  # Lighter model for structured data extraction tasks
  extraction: gpt-5-mini

model_settings:
  extraction:
    temperature: 1
  triage:
    temperature: 1
